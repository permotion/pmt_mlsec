name: pmtmlsec

# ---------------------------------------------------------------------------
# Anchor YAML — configuración común de Airflow
# ---------------------------------------------------------------------------
x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY:-dev-secret-key}
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
    MLSEC_PYTHON: python3
    PYTHONPATH: /opt/airflow/src
  volumes:
    - ../dags:/opt/airflow/dags
    - ../src:/opt/airflow/src
    - ../data:/opt/airflow/data
    - mlflow-artifacts:/opt/mlflow/artifacts
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ---------------------------------------------------------------------------
  # Postgres — backend store compartido (Airflow + MLflow)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MLflow — tracking server
  # UI: http://localhost:5081
  # ---------------------------------------------------------------------------
  mlflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mlflow
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres/mlflow
      --artifacts-destination /opt/mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    ports:
      - "5081:5000"
    volumes:
      - mlflow-artifacts:/opt/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow init — migra la DB y crea el usuario admin (se ejecuta una sola vez)
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - "airflow db migrate && airflow users create --username ${AIRFLOW_WWW_USER_USERNAME:-admin} --firstname Admin --lastname User --role Admin --email admin@mlsec.local --password ${AIRFLOW_WWW_USER_PASSWORD:-admin}"
    restart: "no"

  # ---------------------------------------------------------------------------
  # Airflow webserver — UI
  # http://localhost:5080  (admin / admin)
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "5080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Airflow scheduler — ejecuta los DAGs
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI — inference API
  # UI de docs: http://localhost:5000/docs
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      HOST: 0.0.0.0
      PORT: "5000"
      PYTHONPATH: /app
    ports:
      - "5000:5000"
    volumes:
      - ../models:/app/models
      - mlflow-artifacts:/opt/mlflow/artifacts
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  mlflow-artifacts:
  airflow-logs:
